<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DSAM — Бронирование компьютеров</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }
        .app-container {
            max-width: 420px;
            width: 100%;
            background: #0f0f17;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            height: 95vh;
            max-height: 800px;
            position: relative;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(15, 15, 23, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #1f1f2e;
        }
        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #00f0ff, #b300ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        .header-icons {
            display: flex;
            gap: 16px;
            font-size: 20px;
        }
        .header-icons span {
            cursor: pointer;
            opacity: 0.8;
            transition: 0.2s;
        }
        .header-icons span:hover { opacity: 1; }

        .balance-widget {
            margin: 12px 16px;
            padding: 12px 16px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            border: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
        }
        .balance-widget:hover { border-color: #00f0ff; }
        .balance-label { font-size: 14px; color: #aaa; }
        .balance-amount { font-size: 20px; font-weight: bold; color: #00f0ff; }

        .search-bar {
            margin: 0 16px 12px;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #2a2a4a;
        }
        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            width: 100%;
            font-size: 15px;
        }
        .search-bar input::placeholder { color: #666; }

        .view-toggle {
            display: flex;
            margin: 0 16px 12px;
            background: #1a1a2e;
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
        }
        .view-toggle button {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            color: #888;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .view-toggle button.active {
            background: #00f0ff22;
            color: #00f0ff;
            box-shadow: 0 0 10px #00f0ff33;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 80px;
        }
        .map-placeholder {
            display: none;
            height: 200px;
            background: #1a1a2e;
            border-radius: 16px;
            align-items: center;
            justify-content: center;
            color: #666;
            margin-bottom: 16px;
        }
        .club-list { display: flex; flex-direction: column; gap: 12px; }

        .club-card {
            background: #12121f;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #1f1f2e;
            transition: 0.2s;
            cursor: pointer;
        }
        .club-card:hover { border-color: #00f0ff44; }
        .club-header { display: flex; justify-content: space-between; align-items: start; }
        .club-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .club-rating { color: #ffcc00; font-size: 14px; }
        .club-address { font-size: 13px; color: #999; margin: 4px 0; }
        .club-status { font-size: 13px; margin: 4px 0; }
        .status-open { color: #4cff4c; }
        .status-closed { color: #ff4c4c; }
        .club-price { font-size: 14px; color: #00f0ff; margin-top: 8px; font-weight: 500; }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 20px;
            border-top: 1px solid #1f1f2e;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: #777;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-item.active { color: #00f0ff; }
        .nav-item span { font-size: 20px; margin-bottom: 2px; }

        .content::-webkit-scrollbar { width: 4px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="logo">DSAM</div>
            <div class="header-icons">
                <span>🔔</span>
                <span>⚙️</span>
                <span>👤</span>
            </div>
        </div>

        <div class="balance-widget" onclick="alert('История бонусов')">
            <div>
                <div class="balance-label">💰 Бонусный баланс</div>
                <div class="balance-amount">12 500 бонусов</div>
            </div>
            <span style="font-size:20px;">›</span>
        </div>

        <div class="search-bar">
            <span>🔍</span>
            <input type="text" placeholder="Поиск клуба...">
        </div>

        <div class="view-toggle">
            <button id="btnMap" onclick="switchView('map')">📍 Карта</button>
            <button id="btnList" class="active" onclick="switchView('list')">📋 Список</button>
        </div>

        <div class="content">
            <div id="mapView" class="map-placeholder">🗺️ Карта клубов (будет позже)</div>
            <div id="clubsContainer" class="club-list">
                <div class="loading">🔄 Загрузка клубов...</div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active">
                <span>🏠</span>
                Главная
            </div>
            <div class="nav-item">
                <span>🔍</span>
                Поиск
            </div>
            <div class="nav-item">
                <span>📅</span>
                Брони
            </div>
            <div class="nav-item">
                <span>👤</span>
                Профиль
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.googleusercontent.com/macros/echo?user_content_key=AUkAhnQ3bCWSI0pgPEM7JMSo4KUTZcXwuzlT5YtYeiz4NLuRcoRXwlP79Xj7bzTOKXFQg6GdWjWizW3hQTrySB4J_7FCGMHWJkSBcKUwsNc_hkdvspONouWl4I0he8mWqFjVKttvyl7-XrCG40D_1JfTJ9CoCdKFtlQ7NmITyhAb-Q5vB53qv41X0lA2p_waiN8eWOjc6eA9dhKA04RJrjDhHyoPOIowLfLV5Cv7k_yxfJJo-v3ictbwvcLfalu_odb0iopjPEjIT0FosuK5XKkOsauqZ3AEDQ&lib=MnId7Z2KSH7_de3LWClVoNVt4bZrWZUMy';

        function switchView(view) {
            document.getElementById('mapView').style.display = view === 'map' ? 'flex' : 'none';
            document.getElementById('clubsContainer').style.display = view === 'list' ? 'flex' : 'none';
            document.getElementById('btnMap').classList.toggle('active', view === 'map');
            document.getElementById('btnList').classList.toggle('active', view === 'list');
        }

        async function loadClubs() {
            const container = document.getElementById('clubsContainer');
            try {
                const response = await fetch(API_URL);
                const clubs = await response.json();
                renderClubs(clubs);
            } catch (err) {
                console.error('Ошибка загрузки:', err);
                container.innerHTML = '<div class="loading">❌ Не удалось загрузить клубы</div>';
            }
        }

        function renderClubs(clubs) {
            const container = document.getElementById('clubsContainer');
            
            if (clubs.length === 0) {
                container.innerHTML = '<div class="loading">😕 Клубы пока не добавлены</div>';
                return;
            }

            container.innerHTML = '';
            clubs.forEach(club => {
                const statusClass = club.freeNow > 0 ? 'status-open' : 'status-closed';
                const statusEmoji = club.freeNow > 0 ? '🟢' : '🔴';
                const statusText = club.freeNow > 0 ? 'Открыто' : 'Нет свободных';
                const freeText = club.total > 0 ? `${club.freeNow} из ${club.total} свободно` : 'Нет данных';

                const card = document.createElement('div');
                card.className = 'club-card';
                card.onclick = () => alert(`Открыть клуб: ${club.name}\n(скоро сделаем страницу клуба)`);
                card.innerHTML = `
                    <div class="club-header">
                        <div class="club-name">${club.name}</div>
                        <div class="club-rating">⭐ ${club.rating.toFixed(1)}</div>
                    </div>
                    <div class="club-address">📍 ${club.address}</div>
                    <div class="club-status">
                        <span class="${statusClass}">${statusEmoji} ${statusText}</span>
                    </div>
                    <div style="font-size:13px; color:#aaa;">${statusEmoji} ${freeText}</div>
                    <div class="club-price">от ${club.minPrice.toLocaleString()} сум/час</div>
                `;
                container.appendChild(card);
            });
        }

        document.getElementById('mapView').style.display = 'none';
        loadClubs();
    </script>
</body>
</html>
