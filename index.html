<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DSAM — Бронирование компьютеров</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
        }
        .app-container {
            max-width: 420px;
            width: 100%;
            background: #0f0f17;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            height: 95vh;
            max-height: 800px;
            position: relative;
        }

        /* Шапка */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(15, 15, 23, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #1f1f2e;
            min-height: 56px;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            display: none;
            cursor: pointer;
            font-size: 20px;
            color: #00f0ff;
            padding: 4px;
        }
        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #00f0ff, #b300ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }
        .screen-title {
            font-size: 18px;
            font-weight: 700;
            display: none;
        }
        .header-icons {
            display: flex;
            gap: 16px;
            font-size: 20px;
        }
        .header-icons span {
            cursor: pointer;
            opacity: 0.8;
            transition: 0.2s;
        }
        .header-icons span:hover { opacity: 1; }

        /* Контент */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 80px;
        }

        /* Баланс */
        .balance-widget {
            margin: 12px 0;
            padding: 12px 16px;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            border-radius: 16px;
            border: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
        }
        .balance-widget:hover { border-color: #00f0ff; }
        .balance-label { font-size: 14px; color: #aaa; }
        .balance-amount { font-size: 20px; font-weight: bold; color: #00f0ff; }

        /* Поиск */
        .search-bar {
            margin: 0 0 12px;
            background: #1a1a2e;
            border-radius: 12px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #2a2a4a;
        }
        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            color: white;
            width: 100%;
            font-size: 15px;
        }
        .search-bar input::placeholder { color: #666; }

        /* Переключатель */
        .view-toggle {
            display: flex;
            margin: 0 0 12px;
            background: #1a1a2e;
            border-radius: 10px;
            padding: 4px;
            gap: 4px;
        }
        .view-toggle button {
            flex: 1;
            padding: 8px;
            border: none;
            background: transparent;
            color: #888;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .view-toggle button.active {
            background: #00f0ff22;
            color: #00f0ff;
            box-shadow: 0 0 10px #00f0ff33;
        }

        /* Карточки клубов */
        .club-list { display: flex; flex-direction: column; gap: 12px; }
        .club-card {
            background: #12121f;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #1f1f2e;
            transition: 0.2s;
            cursor: pointer;
        }
        .club-card:hover { border-color: #00f0ff44; }
        .club-header { display: flex; justify-content: space-between; align-items: start; }
        .club-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .club-rating { color: #ffcc00; font-size: 14px; }
        .club-address { font-size: 13px; color: #999; margin: 4px 0; }
        .club-status { font-size: 13px; margin: 4px 0; }
        .status-open { color: #4cff4c; }
        .status-closed { color: #ff4c4c; }
        .club-price { font-size: 14px; color: #00f0ff; margin-top: 8px; font-weight: 500; }

        /* Карточка клуба (детали) */
        .club-detail-photo {
            width: 100%;
            height: 180px;
            background: #1a1a2e;
            border-radius: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 48px;
            overflow: hidden;
        }
        .club-detail-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
        }
        .club-detail-info {
            background: #12121f;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #1f1f2e;
            margin-bottom: 12px;
        }
        .club-detail-info div {
            margin-bottom: 6px;
            font-size: 14px;
        }
        .hall-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            overflow-x: auto;
        }
        .hall-tab {
            padding: 8px 16px;
            background: #1a1a2e;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .hall-tab.active {
            border-color: #00f0ff;
            color: #00f0ff;
            background: #00f0ff11;
        }
        .hall-detail {
            background: #12121f;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #1f1f2e;
            margin-bottom: 12px;
        }
        .hall-detail h4 { margin-bottom: 8px; }
        .hall-specs { font-size: 13px; color: #aaa; margin-bottom: 4px; }
        .package-list { margin-top: 12px; }
        .package-item {
            background: #1a1a2e;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 6px;
            font-size: 13px;
            display: flex;
            justify-content: space-between;
            cursor: pointer;
            transition: 0.2s;
        }
        .package-item:hover { background: #222240; }
        .btn-book {
            display: block;
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00f0ff, #b300ff);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }
        .btn-book:hover { opacity: 0.9; }

        /* Нижняя навигация */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 15, 0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 0 20px;
            border-top: 1px solid #1f1f2e;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 12px;
            color: #777;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-item.active { color: #00f0ff; }
        .nav-item span { font-size: 20px; margin-bottom: 2px; }

        /* Утилиты */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        .screen {
            display: none;
        }
        .screen.active {
            display: block;
        }
        .map-placeholder {
            display: none;
            height: 200px;
            background: #1a1a2e;
            border-radius: 16px;
            align-items: center;
            justify-content: center;
            color: #666;
            margin-bottom: 16px;
        }

        .content::-webkit-scrollbar { width: 4px; }
        .content::-webkit-scrollbar-track { background: transparent; }
        .content::-webkit-scrollbar-thumb { background: #2a2a4a; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Шапка -->
        <div class="header">
            <div class="header-left">
                <span class="back-btn" id="backBtn" onclick="goBack()">←</span>
                <span class="logo" id="headerLogo">DSAM</span>
                <span class="screen-title" id="screenTitle"></span>
            </div>
            <div class="header-icons">
                <span>🔔</span>
                <span>⚙️</span>
                <span>👤</span>
            </div>
        </div>

        <!-- Контент -->
        <div class="content" id="contentArea">
            <!-- ЭКРАН: Главная -->
            <div id="screen-home" class="screen active">
                <div class="balance-widget" onclick="alert('История бонусов')">
                    <div>
                        <div class="balance-label">💰 Бонусный баланс</div>
                        <div class="balance-amount">12 500 бонусов</div>
                    </div>
                    <span style="font-size:20px;">›</span>
                </div>
                <div class="search-bar">
                    <span>🔍</span>
                    <input type="text" placeholder="Поиск клуба..." id="searchInput" oninput="filterClubs()">
                </div>
                <div class="view-toggle">
                    <button id="btnMap" onclick="switchView('map')">📍 Карта</button>
                    <button id="btnList" class="active" onclick="switchView('list')">📋 Список</button>
                </div>
                <div id="mapView" class="map-placeholder">🗺️ Карта клубов (будет позже)</div>
                <div id="clubsContainer" class="club-list">
                    <div class="loading">🔄 Загрузка клубов...</div>
                </div>
            </div>

            <!-- ЭКРАН: Карточка клуба -->
            <div id="screen-club" class="screen">
                <div id="clubDetailContent">
                    <div class="loading">🔄 Загрузка...</div>
                </div>
            </div>

            <!-- ЭКРАН: Бронирования -->
            <div id="screen-bookings" class="screen">
                <div class="loading">📅 Мои брони (скоро)</div>
            </div>

            <!-- ЭКРАН: Профиль -->
            <div id="screen-profile" class="screen">
                <div class="loading">👤 Профиль (скоро)</div>
            </div>
        </div>

        <!-- Нижняя навигация -->
        <div class="bottom-nav" id="bottomNav">
            <div class="nav-item active" data-screen="home" onclick="navigateTo('home')">
                <span>🏠</span>
                Главная
            </div>
            <div class="nav-item" data-screen="bookings" onclick="navigateTo('bookings')">
                <span>📅</span>
                Брони
            </div>
            <div class="nav-item" data-screen="profile" onclick="navigateTo('profile')">
                <span>👤</span>
                Профиль
            </div>
        </div>
    </div>

    <script>
        // ==================== API ====================
        const API_BASE = 'https://script.google.com/macros/s/AKfycbyjMgxyKZTSm8p17BF6nDMXt3D-D4dOSysLqKugPQUFsLKTQgXGGT5qeC6bD8cOQnty/exec';
        
        // ==================== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ====================
        let currentScreen = 'home';
        let screenHistory = ['home'];
        let currentClubId = null;
        let allClubs = []; // Кэш для поиска

        // ==================== НАВИГАЦИЯ ====================
        function navigateTo(screen, clubId = null) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('screen-' + screen).classList.add('active');

            if (screen !== currentScreen) {
                screenHistory.push(screen);
                currentScreen = screen;
            }

            const backBtn = document.getElementById('backBtn');
            const logo = document.getElementById('headerLogo');
            const title = document.getElementById('screenTitle');
            const bottomNav = document.getElementById('bottomNav');

            if (screen === 'home') {
                backBtn.style.display = 'none';
                logo.style.display = 'inline';
                title.style.display = 'none';
                bottomNav.style.display = 'flex';
                screenHistory = ['home'];
            } else {
                backBtn.style.display = 'inline';
                logo.style.display = 'none';
                title.style.display = 'inline';
                bottomNav.style.display = 'none';
            }

            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.screen === screen);
            });

            if (screen === 'club' && clubId) {
                currentClubId = clubId;
                title.textContent = 'Загрузка...';
                loadClubDetail(clubId);
            } else if (screen === 'home') {
                loadClubs();
            }
        }

        function goBack() {
            if (screenHistory.length > 1) {
                screenHistory.pop();
                const prevScreen = screenHistory[screenHistory.length - 1];
                navigateTo(prevScreen);
            }
        }

        // ==================== ПЕРЕКЛЮЧАТЕЛЬ КАРТА/СПИСОК ====================
        function switchView(view) {
            document.getElementById('mapView').style.display = view === 'map' ? 'flex' : 'none';
            document.getElementById('clubsContainer').style.display = view === 'list' ? 'flex' : 'none';
            document.getElementById('btnMap').classList.toggle('active', view === 'map');
            document.getElementById('btnList').classList.toggle('active', view === 'list');
        }

        // ==================== ПОИСК ====================
        function filterClubs() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allClubs.filter(club =>
                club.name.toLowerCase().includes(query) ||
                club.address.toLowerCase().includes(query)
            );
            renderClubs(filtered);
        }

        // ==================== ЗАГРУЗКА КЛУБОВ ====================
        async function loadClubs() {
            const container = document.getElementById('clubsContainer');
            container.innerHTML = '<div class="loading">🔄 Загрузка клубов...</div>';
            try {
                const response = await fetch(API_BASE);
                const clubs = await response.json();
                allClubs = clubs; // Кэшируем для поиска
                renderClubs(clubs);
            } catch (err) {
                console.error('Ошибка загрузки:', err);
                container.innerHTML = '<div class="loading">❌ Не удалось загрузить клубы</div>';
            }
        }

        function renderClubs(clubs) {
            const container = document.getElementById('clubsContainer');
            if (clubs.length === 0) {
                container.innerHTML = '<div class="loading">😕 Клубы не найдены</div>';
                return;
            }
            container.innerHTML = '';
            clubs.forEach(club => {
                const statusClass = club.freeNow > 0 ? 'status-open' : 'status-closed';
                const statusEmoji = club.freeNow > 0 ? '🟢' : '🔴';
                const statusText = club.freeNow > 0 ? 'Открыто' : 'Нет свободных';
                const freeText = club.total > 0 ? `${club.freeNow} из ${club.total} свободно` : 'Нет данных';

                const card = document.createElement('div');
                card.className = 'club-card';
                card.onclick = () => navigateTo('club', club.id);
                card.innerHTML = `
                    <div class="club-header">
                        <div class="club-name">${club.name}</div>
                        <div class="club-rating">⭐ ${club.rating.toFixed(1)}</div>
                    </div>
                    <div class="club-address">📍 ${club.address}</div>
                    <div class="club-status">
                        <span class="${statusClass}">${statusEmoji} ${statusText}</span>
                    </div>
                    <div style="font-size:13px; color:#aaa;">${statusEmoji} ${freeText}</div>
                    <div class="club-price">от ${club.minPrice.toLocaleString()} сум/час</div>
                `;
                container.appendChild(card);
            });
        }

        // ==================== ЗАГРУЗКА ДЕТАЛЕЙ КЛУБА ====================
        async function loadClubDetail(clubId) {
            const container = document.getElementById('clubDetailContent');
            container.innerHTML = '<div class="loading">🔄 Загрузка...</div>';

            try {
                const response = await fetch(API_BASE + '?club_id=' + clubId);
                const club = await response.json();

                if (club.error) {
                    container.innerHTML = '<div class="loading">❌ Клуб не найден</div>';
                    return;
                }

                document.getElementById('screenTitle').textContent = club.name;
                renderClubDetail(club);
            } catch (err) {
                console.error('Ошибка:', err);
                container.innerHTML = '<div class="loading">❌ Ошибка загрузки</div>';
            }
        }

        function renderClubDetail(club) {
            const container = document.getElementById('clubDetailContent');

            let hallsHTML = club.halls.map((hall, i) => `
                <div class="hall-tab ${i === 0 ? 'active' : ''}" onclick="switchHall(${i})">${hall.name}</div>
            `).join('');

            let hallDetailHTML = club.halls.map((hall, i) => `
                <div class="hall-detail" id="hall-${i}" style="${i !== 0 ? 'display:none' : ''}">
                    <h4>${hall.name}</h4>
                    <div class="hall-specs">🖥 ${hall.specs}</div>
                    <div style="color:#4cff4c; margin:8px 0;">
                        🟢 Свободно: ${hall.free_now} из ${hall.total_computers}
                    </div>
                    <div style="font-size:18px; font-weight:700; color:#00f0ff;">
                        ${hall.base_price_hour.toLocaleString()} сум/час
                    </div>
                    ${hall.packages.length > 0 ? `
                        <div class="package-list">
                            ${hall.packages.map(p => `
                                <div class="package-item">
                                    <span>🎮 ${p}</span>
                                    <span>›</span>
                                </div>
                            `).join('')}
                        </div>
                    ` : ''}
                    <button class="btn-book" onclick="alert('Бронирование (скоро)')">
                        💰 Забронировать
                    </button>
                </div>
            `).join('');

            container.innerHTML = `
                <div class="club-detail-photo">
                    ${club.photo_url ? `<img src="${club.photo_url}" alt="${club.name}">` : '🖥️'}
                </div>
                <div class="club-detail-info">
                    <div>⭐ Рейтинг: ${club.rating.toFixed(1)}</div>
                    <div>📍 ${club.address}</div>
                    <div>🕐 ${club.working_hours || '09:00 – 02:00'}</div>
                    <div>📞 ${club.phone || 'Нет данных'}</div>
                </div>
                <div class="hall-tabs">${hallsHTML}</div>
                ${hallDetailHTML}
            `;
        }

        function switchHall(index) {
            document.querySelectorAll('.hall-tab').forEach((tab, i) => tab.classList.toggle('active', i === index));
            document.querySelectorAll('.hall-detail').forEach((detail, i) => detail.style.display = i === index ? 'block' : 'none');
        }

        // ==================== СТАРТ ====================
        document.getElementById('mapView').style.display = 'none';
        loadClubs();
    </script>
</body>
</html>
